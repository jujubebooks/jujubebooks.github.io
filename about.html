    <div class="about-copy" data-ko-html="<p>쥬쥬베북스는 더 나은 세상의 단초가 될 다정한 책을 만듭니다.<br>구석진 곳에 눈을 멈추고, 작고 소박한 목소리에 귀를 기울입니다.<br>작은 몸집이 할 수 있는 담대하고 대담한 출판을 지향합니다.</p><p>쥬쥬베를 뜻하는 ‘대추’가 헛꽃 없이 모든 꽃에 열매를 맺듯,<br>쥬쥬베북스도 세상에 꼭 필요한 이야기를 담은 옹골찬 활동을 이어나가고자 합니다.</p><p>쥬쥬베(대추)처럼, 귀엽고 맛좋은 건 덤!</p>" data-en-html="<p>Jujube Books is a Korean publisher creating kind books that can become the first sparks of a better world — picture books, essays, graphic novels, and plays. We pause our gaze on overlooked corners and listen closely to small and humble voices. We strive to make books that are comfortable for everyone, regardless of disability/ability, sexual orientation, immigration status, and more. Though modest in size, we aim for publishing that is courageous and bold.</p><p>Just as the jujube tree — whose Korean name, daechu, means jujube — bears fruit from every blossom without a single empty flower, Jujube Books hopes to continue its steadfast work of creating books filled with stories the world truly needs.</p><p>Like jujube, loveliness and deliciousness are a bonus!</p>">
      <p>쥬쥬베북스는 더 나은 세상의 단초가 될 다정한 책을 만듭니다.<br>구석진 곳에 눈을 멈추고, 작고 소박한 목소리에 귀를 기울입니다.<br>작은 몸집이 할 수 있는 담대하고 대담한 출판을 지향합니다.</p><p>쥬쥬베를 뜻하는 ‘대추’가 헛꽃 없이 모든 꽃에 열매를 맺듯,<br>쥬쥬베북스도 세상에 꼭 필요한 이야기를 담은 옹골찬 활동을 이어나가고자 합니다.</p><p>쥬쥬베(대추)처럼, 귀엽고 맛좋은 건 덤!</p>

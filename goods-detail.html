<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="page-title">AND MORE — JUJUBE BOOKS</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="nav-grid">
  <a href="about.html">JUJUBE BOOKS</a>
  <a href="books.html">BOOK</a>
  <a href="goods.html" class="active">AND MORE</a>
  <a href="news.html">NEWS</a>
</header>

<main>
  <section class="detail-hero">
    <div class="detail-cover" id="detail-cover"></div>
    <div class="detail-kicker" id="detail-kicker"></div>
    <h1 id="detail-title"></h1>
    <div class="detail-meta" id="detail-meta"></div>
  </section>

  <div class="detail-tags" id="detail-tags"></div>

  <section class="detail-body">
    <h2 id="synopsis-title"></h2>
    <p id="synopsis-text"></p>
  </section>

  <section class="detail-body">
    <h2 id="body2-title"></h2>
    <p id="body2-text"></p>
  </section>

  <div class="detail-rich" id="detail-image-block"></div>

  <a class="back-link" href="goods.html" data-ko="← 목록으로" data-en="← Back to list">← 목록으로</a>
</main>

<footer class="footer-grid">
  <a href="index.html" class="footer-cell">HOME</a>
  <a href="catalog.html" class="footer-cell">CATALOG</a>
  <a href="contact.html" class="footer-cell">CONTACT</a>
  <div class="footer-cell">
    <div class="lang-toggle">
      <button data-lang="ko">KOR</button>
      <button data-lang="en">ENG</button>
    </div>
  </div>
</footer>



<script src="script.js"></script>
<script>
  loadGoods().then((allGoods) => {
    const good = findBySlug(allGoods, getSlugFromQuery());
    const goodCategory = pickText(good, "category", "categoryEn");
    const goodPrice = pickText(good, "price", "priceEn");
    renderDetail(good, {
      kicker: goodCategory,
      meta: goodPrice ? goodCategory + " · " + goodPrice : goodCategory
    });

    if (good.detailCoverScale) {
      document.getElementById("detail-cover").style.width =
        "calc(min(360px, 70vw) * " + good.detailCoverScale + ")";
    }

    // extra product photos from the item's own folder (thumbnail/main image excluded —
    // that one already appears once, in the hero cover above the title)
    const galleryEl = document.getElementById("detail-image-block");
    if (galleryEl) {
      if (good.folder && good.galleryImages && good.galleryImages.length) {
        galleryEl.innerHTML =
          '<div class="detail-inside-gallery">' +
          good.galleryImages.map((name) => realImageTag(good.folder, name)).join("") +
          "</div>";
      } else {
        galleryEl.style.display = "none";
      }
    }
  });
</script>
</body>
</html>

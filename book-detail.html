<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="page-title">BOOK — JUJUBE BOOKS</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body class="book-detail-page">

<header class="nav-grid">
  <a href="about.html">JUJUBE BOOKS</a>
  <a href="books.html" class="active">BOOK</a>
  <a href="goods.html">AND MORE</a>
  <a href="news.html">NEWS</a>
</header>

<main>
  <section class="detail-hero">
    <div class="detail-cover" id="detail-cover"></div>
    <div class="detail-kicker" id="detail-kicker"></div>
    <h1 id="detail-title"></h1>
    <div class="detail-meta" id="detail-meta"></div>
  </section>

  <div class="detail-tags" id="detail-tags"></div>

  <div class="detail-rich" id="detail-rich"></div>

  <div id="detail-fallback">
    <section class="detail-body">
      <h2 id="synopsis-title"></h2>
      <p id="synopsis-text"></p>
    </section>

    <div class="detail-image">
      <div class="cover-block" id="detail-image-block"></div>
    </div>

    <section class="detail-body">
      <h2 id="body2-title"></h2>
      <p id="body2-text"></p>
    </section>
  </div>

  <a class="back-link" href="books.html" data-ko="← 목록으로" data-en="← Back to list">← 목록으로</a>
</main>

<footer class="footer-grid">
  <a href="index.html" class="footer-cell">HOME</a>
  <a href="catalog.html" class="footer-cell">CATALOG</a>
  <a href="contact.html" class="footer-cell">CONTACT</a>
  <div class="footer-cell">
    <div class="lang-toggle">
      <button data-lang="ko">KOR</button>
      <button data-lang="en">ENG</button>
    </div>
  </div>
</footer>



<script src="script.js"></script>
<script>
  const book = findBySlug(BOOKS, getSlugFromQuery());
  if (book.detailBackground) document.body.style.background = book.detailBackground;
  const bookAuthor = pickText(book, "author", "authorEn");
  const bookCategory = pickText(book, "category", "categoryEn");
  const bookMeta = currentLang() === "en"
    ? bookAuthor + " · " + book.date + " · " + bookCategory
    : bookAuthor + " 지음 · " + book.date + " · " + bookCategory;
  renderDetail(book, {
    kicker: bookCategory,
    meta: bookMeta
  });

  // richer, hand-formatted detail content when available: a tall illustrated
  // spread image for Korean, full editorial copy for English — falls back to
  // the plain synopsis/body2 fields above when a book doesn't have this yet
  const richEl = document.getElementById("detail-rich");
  const fallbackEl = document.getElementById("detail-fallback");
  const lang = currentLang();
  let usedRich = false;
  if (lang === "en" && book.detailHtmlEn) {
    richEl.innerHTML = book.detailHtmlEn;
    usedRich = true;
  } else if (lang !== "en" && book.detailImage) {
    richEl.innerHTML =
      '<img src="이미지/BOOK/detail_image/' + encodeURIComponent(book.detailImage) + '" alt="" class="detail-rich-image">' +
      (book.detailBibKo ? '<div class="detail-bib-ko">' + book.detailBibKo + '</div>' : '');
    usedRich = true;
  }
  if (usedRich) {
    fallbackEl.style.display = "none";
  } else {
    richEl.style.display = "none";
  }
</script>
</body>
</html>

<main>
  <section class="detail-hero">
    <div class="detail-cover" id="detail-cover"></div>
    <div class="detail-kicker" id="detail-kicker"></div>
    <h1 id="detail-title"></h1>
    <div class="detail-meta" id="detail-meta"></div>
  </section>

  <div class="detail-tags" id="detail-tags"></div>

  <div class="detail-rich" id="detail-rich"></div>

  <div id="detail-fallback">

      <h2 id="synopsis-title"></h2>

    </section>

    <div class="detail-image">
      <div id="detail-image-block"></div>
    </div>

    </section>
  </div>

<script src="script.js"></script>
<script>
loadBooks().then((books) => {
  const book = findBySlug(books, getSlugFromQuery());
  if (book.detailBackground) document.body.style.background = book.detailBackground;
  const bookAuthor = pickText(book, "author", "authorEn");
  const bookCategory = pickText(book, "category", "categoryEn");
  const bookMeta = currentLang() === "en"
    ? bookAuthor + " · " + book.date + " · " + bookCategory
    : bookAuthor + " 지음 · " + book.date + " · " + bookCategory;
  renderDetail(book, {
    kicker: bookCategory,
    meta: bookMeta
  });

  if (book.detailCoverScale) {
    // scales the artwork itself within the normal-size cover box (cropped by
    // the box's overflow:hidden) — some source images have a lot of empty
    // padding baked in, so enlarging the outer box just made that padding
    // bigger too; zooming the image crops that padding away instead
    const coverImg = document.querySelector("#detail-cover img");
    if (coverImg) coverImg.style.transform = "scale(" + book.detailCoverScale + ")";
  }

  // richer, hand-formatted detail content when available: a tall illustrated
  // spread image for Korean, full editorial copy for English — falls back to
  // the plain synopsis/body2 fields above when a book doesn't have this yet
  const richEl = document.getElementById("detail-rich");
  const fallbackEl = document.getElementById("detail-fallback");
  const lang = currentLang();
  let usedRich = false;

  // sheet-driven books keep their detail image in their own folder (like
  // AND MORE/NEWS); the original hand-built books use a shared legacy folder
  const detailImageTag = !book.detailImage
    ? ""
    : book.detailImageFolder
      ? realImageTag(book.detailImageFolder, book.detailImage)
      : '<img src="이미지/BOOK/detail_image/' + encodeURIComponent(book.detailImage) + '" alt="" class="detail-rich-image">';

  const galleryFolder = book.galleryFolder || book.folder;
  const galleryHtml = (book.galleryImages && book.galleryImages.length && galleryFolder)
    ? '<div class="detail-inside-gallery">' + book.galleryImages.map((name) => realImageTag(galleryFolder, name)).join("") + "</div>"
    : "";

  if (lang === "en" && book.detailHtmlEn) {
    richEl.innerHTML = book.detailHtmlEn + galleryHtml;
    usedRich = true;
  } else if (lang === "en" && book.detailBibEn) {
    // English side shows bibliographic info + intro text + interior-page
    // gallery only — no Korean marketing spread image
    const introHtml = book.detailIntroEn ? '<div style="margin-top:1.6em;">' + book.detailIntroEn + '</div>' : '';
    richEl.innerHTML = '<div class="detail-bib-ko">' + book.detailBibEn + introHtml + '</div>' + galleryHtml;
    usedRich = true;
  } else if (lang !== "en" && book.detailImage) {
    richEl.innerHTML = detailImageTag + (book.detailBibKo ? '<div class="detail-bib-ko">' + book.detailBibKo + '</div>' : '');
    usedRich = true;
  }
  // some titles offer a downloadable sample for foreign-rights readers —
  // English side only, appended after whichever rich layout was used above
  if (lang === "en" && book.foreignSampleUrl) {
    richEl.innerHTML += '<div style="margin-top:2.4em; text-align:center;"><a class="pill-btn" href="' + escapeHtml(book.foreignSampleUrl) + '" target="_blank" rel="noopener">Download Foreign Language Sample</a></div>';
    usedRich = true;
  }

  // Korean side only: a direct link to where the book can be purchased
  if (lang !== "en" && book.purchaseLinkKo) {
    richEl.innerHTML += '<div style="margin-top:2.4em; text-align:center;"><a class="pill-btn" href="' + escapeHtml(book.purchaseLinkKo) + '" target="_blank" rel="noopener">구매 페이지로 이동</a></div>';
    usedRich = true;
  }

  if (usedRich) {
    fallbackEl.style.display = "none";
  } else {
    richEl.style.display = "none";
  }
});
</script>
</body>
</html>

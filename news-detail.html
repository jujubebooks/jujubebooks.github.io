<script>
  function showNewsItem(newsItem) {
    renderDetail(newsItem, {
      kicker: pickText(newsItem, "label", "labelEn") || newsItem.date || "",
      meta: ""
    });

    // optional photo(s) for this news item — folder is just the subfolder name,
    // photos live under 이미지/NEWS/<folder>/ (same convention as BOOK/AND MORE).
    // "main" always shows first; the sheet's "photos" column can list extra
    // filenames (comma-separated, no extension) to show more after it.
    if (newsItem.folder) {
      const imageBlock = document.getElementById("news-image-block");
      const folderPath = "NEWS/" + newsItem.folder;
      const photoNames = [newsItem.image || "main"].concat(newsItem.photos || []);
      imageBlock.innerHTML = photoNames.map((name) => realImageTag(folderPath, name)).join("");
      imageBlock.style.display = "";
    }

    // optional longer write-up for this news item — only shown when provided
    const newsBody = pickText(newsItem, "body", "bodyEn");
    if (newsBody) {
      document.getElementById("news-body-text").textContent = newsBody;
      document.getElementById("news-body-section").style.display = "";
    }
  }

  // pinned notices are hardcoded (not sheet-driven), so a match here skips
  // the network fetch entirely
  const pinnedItem = NEWS_PINNED.find((i) => i.slug === getSlugFromQuery());
  if (pinnedItem) {
    showNewsItem(pinnedItem);
  } else {
    loadNews().then((allNews) => showNewsItem(findBySlug(allNews, getSlugFromQuery())));
  }
</script>
